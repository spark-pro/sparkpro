services:
  mysql:
    image: mysql:8.0
    container_name: sparkpro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: SparkLocal@123
      MYSQL_DATABASE: Spark_Pro_DB
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - sparkpro_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSparkLocal@123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sparkpro_mysql_data:
    driver: local
